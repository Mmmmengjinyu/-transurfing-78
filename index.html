<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reality Transurfing 阅读日志 — 78天</title>
<style>
/* ========================================
   RESET & BASE
   ======================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fdfaf3;
  --bg-card: #fffef9;
  --text: #2c2416;
  --text-muted: #6b5e4a;
  --gold: #b8963e;
  --gold-light: #d4b96a;
  --border: #e0d7c2;
  --sidebar-bg: #f7f2e4;
  --sidebar-hover: #ede3ce;
  --sidebar-active: #e4d5b0;
  --accent-en: #8b6f47;
  --accent-cn: #5a7a6f;
  --accent-question: #9b5984;
  --accent-reflect: #c47b3b;
  --accent-summary: #3b6b8b;
  --dot-empty: #d4cbb8;
  --dot-filled: #b8963e;
  --shadow: 0 2px 8px rgba(44,36,22,0.06), 0 1px 3px rgba(44,36,22,0.04);
  --shadow-lg: 0 4px 20px rgba(44,36,22,0.10), 0 2px 6px rgba(44,36,22,0.05);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
}

body {
  font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: 1fr;
  height: 100vh;
  overflow: hidden;
  line-height: 1.6;
}

/* ========================================
   SIDEBAR
   ======================================== */
.sidebar {
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-header h1 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1.3;
  white-space: nowrap;
}

.progress-bar-wrap {
  margin: 12px 20px 0;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.5s ease;
}
.progress-text {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin: 4px 20px 0;
  text-align: right;
}

.day-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.day-nav::-webkit-scrollbar { width: 4px; }
.day-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Part group */
.part-group {
  margin-bottom: 2px;
}
.part-toggle {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 20px;
  border: none; background: none;
  font-size: 0.82rem; font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  text-align: left;
  letter-spacing: 0.04em;
  transition: color var(--transition);
}
.part-toggle:hover { color: var(--text); }
.part-toggle .arrow {
  font-size: 0.6rem; transition: transform var(--transition);
  display: inline-block;
}
.part-group.collapsed .part-toggle .arrow { transform: rotate(-90deg); }
.part-group.collapsed .day-list { display: none; }

/* Day items */
.day-list { list-style: none; }
.day-item { display: block; }
.day-link {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 20px 6px 32px;
  text-decoration: none; color: var(--text);
  font-size: 0.84rem;
  transition: background var(--transition);
  cursor: pointer; border: none; background: none; width: 100%; text-align: left;
  font-family: inherit;
}
.day-link:hover { background: var(--sidebar-hover); }
.day-link.active { background: var(--sidebar-active); font-weight: 600; }
.day-link .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--dot-empty);
  transition: background var(--transition);
}
.day-link .dot.filled { background: var(--dot-filled); }
.day-link .day-num { min-width: 28px; font-variant-numeric: tabular-nums; }
.day-link .day-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ========================================
   SIDEBAR FOOTER
   ======================================== */
.sidebar-footer {
  padding: 6px 10px;
  border-top: 1px solid var(--border);
  display: flex; gap: 4px; flex-shrink: 0;
}
.sidebar-footer button {
  flex: 1; padding: 5px 6px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text);
  font-size: 0.7rem; cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}
.sidebar-footer button:hover { background: var(--sidebar-hover); border-color: var(--gold); }

/* ========================================
   MAIN CONTENT
   ======================================== */
.main {
  display: flex; flex-direction: column;
  overflow: hidden;
}

.main-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
  gap: 12px;
}
.main-header .day-label { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.02em; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.main-header .day-label .cn { color: var(--text-muted); font-weight: 400; font-size: 0.9rem; }
.editable-title {
  outline: none; border-radius: 4px; padding: 2px 6px; margin: -2px 0;
  transition: background 0.15s ease;
  min-width: 60px; display: inline-block;
  cursor: text;
}
.editable-title:hover { background: rgba(184,150,62,0.08); }
.editable-title:focus { background: rgba(184,150,62,0.12); color: var(--text); }
.day-date-pick {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.72rem; font-family: inherit;
  color: var(--text); background: var(--bg);
  width: 130px;
}
.day-date-clear {
  padding: 3px 6px; font-size: 0.65rem;
  border: none; background: none;
  color: var(--text-muted); cursor: pointer;
  font-family: inherit;
  visibility: hidden;
}
.day-date-clear.has-date { visibility: visible; }
.day-date-clear:hover { color: #c44; }
.done-toggle {
  font-size: 0.75rem; color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; gap: 4px; user-select: none;
  white-space: nowrap;
}
.done-toggle input { cursor: pointer; margin: 0; }
.nav-buttons { display: flex; gap: 6px; }
.nav-buttons button {
  padding: 8px 18px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text);
  font-size: 0.84rem; cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}
.nav-buttons button:hover:not(:disabled) { background: var(--sidebar-hover); border-color: var(--gold); }
.nav-buttons button:disabled { opacity: 0.35; cursor: default; }
.mobile-menu-btn {
  display: none;
  padding: 6px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text);
  font-size: 1.1rem; cursor: pointer;
  font-family: inherit;
}

.content-scroll {
  flex: 1; overflow-y: auto; padding: 24px 28px 40px;
}
.content-scroll::-webkit-scrollbar { width: 6px; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ========================================
   CARDS
   ======================================== */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  max-width: 1100px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.card.card-full { grid-column: 1 / -1; }
.bottom-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 18px;
}
@media (max-width: 768px) {
  .bottom-row { grid-template-columns: 1fr; }
}

.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 0.9rem;
  letter-spacing: 0.02em;
}
.card-header .card-icon { font-size: 1.1rem; }
.card-en .card-header { color: var(--accent-en); }
.card-cn .card-header { color: var(--accent-cn); }
.card-question .card-header { color: var(--accent-question); }
.card-reflect .card-header { color: var(--accent-reflect); }
.card-summary .card-header { color: var(--accent-summary); }

.card-body { display: flex; min-height: 0; }
.card-body-split { flex-direction: column; gap: 0; }
.card-body-split .sub-section {
  display: flex; flex-direction: column;
  border-bottom: 1px solid var(--border);
  flex: 0 0 auto;
}
.card-body-split .sub-section:last-child { border-bottom: none; }
.sub-label {
  font-size: 0.8rem; font-weight: 700; letter-spacing: 0.02em;
  padding: 10px 18px 6px;
  color: #fff;
  background: var(--accent-en);
  display: flex; align-items: center; gap: 6px;
}
.card-cn .sub-label { background: var(--accent-cn); }
.sub-label::before {
  content: '▸'; font-size: 0.6rem;
}
.card-body textarea, .card-body .editable {
  display: block; width: 100%; box-sizing: border-box;
  padding: 16px 18px;
  border: none; background: transparent;
  font-size: 0.9rem; line-height: 2.0;
  color: var(--text); resize: none; overflow: hidden;
  font-family: inherit;
  min-height: 80px;
}
.card-body textarea.text-en, .card-body .editable.text-en {
  word-break: keep-all;
  overflow-wrap: break-word;
  text-align: justify;
  hyphens: auto;
}

/* ========================================
   FORMAT TOOLBAR
   ======================================== */
.format-toolbar {
  position: absolute; z-index: 50;
  display: none; align-items: center; gap: 2px;
  padding: 4px 6px;
  background: #3a3224; border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transform: translateY(-110%);
}
.format-toolbar.show { display: flex; }
.format-toolbar button {
  width: 30px; height: 28px;
  border: none; border-radius: 5px;
  background: transparent; color: #d4c9b0;
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: inherit;
  transition: all 0.12s ease;
}
.format-toolbar button:hover { background: rgba(255,255,255,0.15); color: #fff; }
.format-toolbar button.active { background: var(--gold); color: #fff; }
.format-toolbar .fmt-sep {
  width: 1px; height: 16px; background: rgba(255,255,255,0.2); margin: 0 3px;
}
.format-toolbar button.fmt-highlight { color: #f5d442; }
.format-toolbar button.fmt-highlight:hover { background: rgba(245,212,66,0.3); }

/* contenteditable extra styling */
.editable {
  outline: none;
}
.editable:empty::before {
  content: attr(data-placeholder);
  color: #c4b998; font-style: italic;
}
.editable b, .editable strong { font-weight: 700; }
.editable i, .editable em { font-style: italic; }
.editable u { text-decoration: underline; }
.editable .hl { background: #fef3a0; padding: 0 2px; border-radius: 2px; }
.card-body textarea:focus { outline: none; }
.card-body textarea::placeholder { color: #c4b998; font-style: italic; }
.card-body .saved-indicator {
  position: absolute; bottom: 8px; right: 14px;
  font-size: 0.7rem; color: #8b9a6b;
  opacity: 0; transition: opacity 0.4s ease;
}
.card-body .saved-indicator.show { opacity: 1; }

/* ========================================
   OVERLAY (mobile sidebar)
   ======================================== */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(44,36,22,0.3);
  z-index: 90;
}
.sidebar-overlay.show { display: block; }

/* ========================================
   RESPONSIVE
   ======================================== */
@media (max-width: 768px) {
  body { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 0; height: 100vh; width: 280px;
    z-index: 100; display: flex; flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    box-shadow: var(--shadow-lg);
  }
  .sidebar.open { transform: translateX(0); }
  .day-nav { flex: 1 1 auto; overflow-y: auto; min-height: 0; }
  .sidebar-footer { flex-shrink: 0; padding: 4px 8px; }
  .sidebar-footer button { padding: 3px 4px; font-size: 0.62rem; }
  .sidebar-header { padding: 10px 14px 8px; }
  .sidebar-header h1 { font-size: 0.85rem; }
  .mobile-menu-btn { display: inline-block; }
  .cards-grid { grid-template-columns: 1fr; }
  .content-scroll { padding: 16px 14px 32px; }
  .main-header { padding: 12px 14px; }
  .main-header .day-label { font-size: 1rem; }
  .nav-buttons button { padding: 6px 12px; font-size: 0.78rem; }
  .sidebar-overlay.show { display: block; }
}

@media (max-width: 480px) {
  .main-header { flex-wrap: wrap; }
  .main-header .day-label { order: 1; width: 100%; }
  .nav-buttons { order: 2; }
}

/* ========================================
   SUPPLEMENT TABLE
   ======================================== */
.supp-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 24px 28px;
}
.supp-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.supp-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 18px; }
.supp-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; line-height: 1.7; }
.supp-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
.supp-table tr:last-child td { border-bottom: none; }
.supp-label {
  font-weight: 700; color: var(--gold); white-space: nowrap;
  width: 110px; min-width: 90px;
}

/* ========================================
   FOCUS MODE
   ======================================== */
body.focus-mode { grid-template-columns: 1fr; }
body.focus-mode .sidebar { display: none; }
body.focus-mode .sidebar-overlay { display: none; }
body.focus-mode .cal-strip { display: none; }
body.focus-mode .main-header { padding-left: 28px; }
.focus-btn {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); cursor: pointer;
  font-size: 0.78rem; font-family: inherit;
  transition: all var(--transition);
  white-space: nowrap;
}
.focus-btn:hover { border-color: var(--gold); }
.focus-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); }

/* ========================================
   CHAT PANEL
   ======================================== */
.chat-btn {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--gold); color: #fff; border: none;
  font-size: 1.3rem; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: all 0.2s ease;
  display: flex; align-items: center; justify-content: center;
}
.chat-btn:hover { background: #a07d2e; transform: scale(1.08); }
.chat-panel {
  position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
  z-index: 210; background: var(--bg-card); border-left: 1px solid var(--border);
  box-shadow: -4px 0 24px rgba(0,0,0,0.12);
  transition: right 0.3s ease;
  display: flex; flex-direction: column;
}
.chat-panel.open { right: 0; }
.chat-panel-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
}
.chat-panel-header button {
  border: none; background: none; font-size: 1.2rem; cursor: pointer;
  color: var(--text-muted); padding: 2px 6px; font-family: inherit;
}
.chat-api-row {
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  display: flex; gap: 6px; flex-shrink: 0; font-size: 0.72rem;
}
.chat-api-row input {
  flex: 1; padding: 5px 8px; border: 1px solid var(--border);
  border-radius: 4px; font-size: 0.72rem; font-family: inherit;
  background: var(--bg);
}
.chat-api-row button {
  padding: 5px 10px; border: 1px solid var(--border);
  border-radius: 4px; background: var(--bg); cursor: pointer;
  font-size: 0.7rem; font-family: inherit; white-space: nowrap;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.chat-msg {
  max-width: 88%; padding: 10px 14px; border-radius: 14px;
  font-size: 0.82rem; line-height: 1.6; word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end; background: var(--gold); color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-msg.assistant {
  align-self: flex-start; background: #f0ebe0; color: var(--text);
  border-bottom-left-radius: 4px;
}
.chat-msg.error { background: #fce4e4; color: #a33; align-self: stretch; border-radius: 8px; }
.chat-input-row {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
}
.chat-input-row textarea {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 0.82rem; font-family: inherit;
  resize: none; min-height: 38px; max-height: 100px;
  background: var(--bg);
}
.chat-input-row button {
  padding: 8px 16px; border: none; border-radius: 8px;
  background: var(--gold); color: #fff; font-weight: 600;
  cursor: pointer; font-size: 0.82rem; font-family: inherit;
  white-space: nowrap;
}
.chat-input-row button:disabled { opacity: 0.4; cursor: default; }
.chat-typing { font-size: 0.72rem; color: var(--text-muted); padding: 4px 14px; display: none; }
.chat-typing.show { display: block; }
.chat-model-btn {
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 14px;
  background: var(--bg); color: var(--text-muted); cursor: pointer;
  font-size: 0.72rem; font-family: inherit;
  transition: all 0.15s ease;
}
.chat-model-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); }
.chat-model-btn:hover:not(.active) { border-color: var(--gold); color: var(--text); }

@media (max-width: 768px) {
  .chat-panel { width: 100vw; right: -100vw; }
}

/* ========================================
   CALENDAR STRIP (compact)
   ======================================== */
.cal-strip {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 16px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  max-width: 1100px;
  flex-wrap: wrap;
  font-size: 0.72rem;
}
.cal-strip-label {
  color: var(--text-muted);
  white-space: nowrap;
  font-size: 0.7rem;
  cursor: pointer;
  user-select: none;
}
.cal-strip-cells {
  display: flex; gap: 3px; flex-wrap: wrap; align-items: center;
}
.cal-strip-cell {
  width: 20px; height: 20px;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem; font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.12s ease;
  font-family: inherit;
  background: #e8e2d2;
  color: #a09578;
  padding: 0;
  line-height: 1;
}
.cal-strip-cell:hover { transform: scale(1.25); z-index: 2; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
.cal-strip-cell.filled { background: var(--gold); color: #fff; font-weight: 600; }
.cal-strip-cell.current { border-color: #c47b3b; box-shadow: 0 0 0 1.5px rgba(196,123,59,0.3); }
.cal-strip-cell.today-mark { border-color: var(--accent-cn); border-style: dashed; }

.cal-strip-month-sep {
  width: 0; height: 14px;
  border-left: 1px solid var(--border);
  margin: 0 4px;
}
.cal-strip-month-label {
  font-size: 0.6rem; color: var(--text-muted);
  white-space: nowrap;
  margin-right: 2px;
}

/* ========================================
   PRINT
   ======================================== */
@media print {
  body { display: block; overflow: visible; }
  .sidebar, .sidebar-overlay, .main-header, .nav-buttons, .mobile-menu-btn, .sidebar-footer { display: none !important; }
  .main { overflow: visible; }
  .content-scroll { overflow: visible; padding: 0; }
  .cards-grid { max-width: 100%; }
  .card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  .card-body textarea, .card-body .editable { border: none; }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!-- SIDEBAR OVERLAY (mobile)                     -->
<!-- ============================================ -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ============================================ -->
<!-- SIDEBAR                                      -->
<!-- ============================================ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📖 Transurfing in 78 Days</h1>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">已完成 0 / 78 天</div>

  <nav class="day-nav" id="dayNav">
    <!-- Generated by JS -->
  </nav>

  <div class="sidebar-footer" style="flex-wrap:wrap;gap:3px;">
    <button onclick="loadPresetContent()" title="导入前20天">📥</button>
    <button onclick="exportAll()" title="导出">💾</button>
    <button onclick="document.getElementById('importFile').click()" title="导入">📤</button>
    <button id="cloudSetupBtn" onclick="setupCloud()" title="设置Token">⚙️</button>

function storageKey(dayIndex, field) {
  return STORAGE_PREFIX + 'd' + DAYS[dayIndex].day + '_' + field;
}
function storageKeyOld(dayIndex, field) {
  // Old keys used the same pattern — needed for migration
  return STORAGE_PREFIX + 'd' + DAYS[dayIndex].day + '_' + field;
}

/* Migrate old data (contentEn/contentCn → principleEn/interpretationEn) */
(function migrateOldData() {
  for (let i = 0; i < DAYS.length; i++) {
    const oldEn = localStorage.getItem(storageKeyOld(i, 'contentEn'));
    const newEn = localStorage.getItem(storageKey(i, 'principleEn'));
    if (oldEn && !newEn) {
      localStorage.setItem(storageKey(i, 'principleEn'), oldEn);
      localStorage.removeItem(storageKeyOld(i, 'contentEn'));
    }
    const oldCn = localStorage.getItem(storageKeyOld(i, 'contentCn'));
    const newCn = localStorage.getItem(storageKey(i, 'principleCn'));
    if (oldCn && !newCn) {
      localStorage.setItem(storageKey(i, 'principleCn'), oldCn);
      localStorage.removeItem(storageKeyOld(i, 'contentCn'));
    }
  }
})();

function loadDay(dayIndex) {
  const data = {};
  textareaIds.forEach(field => {
    const val = localStorage.getItem(storageKey(dayIndex, field));
    data[field] = val !== null ? val : '';
  });
  return data;
}

function saveField(dayIndex, field, value) {
  if (value.trim() === '') {
    localStorage.removeItem(storageKey(dayIndex, field));
  } else {
    localStorage.setItem(storageKey(dayIndex, field), value);
  }
  updateProgress();
}

function doneKey(dayIndex) {
  return STORAGE_PREFIX + 'd' + DAYS[dayIndex].day + '_done';
}
function isDayComplete(dayIndex) {
  return localStorage.getItem(doneKey(dayIndex)) === '1';
}
function toggleDayDone() {
  if (isDayComplete(currentDay)) {
    localStorage.removeItem(doneKey(currentDay));
  } else {
    localStorage.setItem(doneKey(currentDay), '1');
  }
  updateDoneCheckbox();
  updateProgress();
  renderSidebar();
  clearTimeout(window._cloudUploadTimer);
  window._cloudUploadTimer = setTimeout(uploadToCloud, 1000);
}
function updateDoneCheckbox() {
  var cb = document.getElementById('dayDoneCb');
  if (cb) cb.checked = isDayComplete(currentDay);
}

function countCompletedDays() {
  let count = 0;
  for (let i = 0; i < DAYS.length; i++) {
    if (isDayComplete(i)) count++;

      link.onclick = (function(i){ return function(e){ e.stopPropagation(); saveCurrentContent(); currentView='day'; currentDay=i; localStorage.setItem(STORAGE_PREFIX+'currentDay',DAYS[i].day); renderSidebar(); renderMain(); renderCalendar(); closeSidebar(); }; })(idx);
      li.appendChild(link);
      dayList.appendChild(li);
    });

    group.appendChild(dayList);
    $dayNav.appendChild(group);
  });

  // Part 5: Supplementary Reading
  var suppGroup = document.createElement('div');
  suppGroup.className = 'part-group';
  if (currentView !== 'supplement') suppGroup.classList.add('collapsed');
  var suppToggle = document.createElement('button');
  suppToggle.className = 'part-toggle';
  suppToggle.innerHTML = '<span class="arrow">▼</span> 📚 补充阅读';
  suppToggle.onclick = function(){ suppGroup.classList.toggle('collapsed'); };
  suppGroup.appendChild(suppToggle);
  var suppList = document.createElement('ul');
  suppList.className = 'day-list';
  var supplements = getSupplements();
  supplements.forEach(function(s, si){
    var li = document.createElement('li'); li.className = 'day-item';
    var row = document.createElement('div'); row.style.display = 'flex'; row.style.alignItems = 'center';
    var link = document.createElement('button');
    link.className = 'day-link' + (currentView==='supplement' && currentSuppIndex===si ? ' active' : '');
    link.style.flex = '1';
    link.innerHTML = '<span class="dot filled"></span><span class="day-title">' + s.author + '</span>';
    link.onclick = function(){ switchToSupplement(si); };
    row.appendChild(link);
    // Delete button for custom entries (not defaults)
    if (si >= DEFAULT_SUPPLEMENTS.length) {
      var delBtn = document.createElement('button');
      delBtn.innerHTML = '✕';
      delBtn.title = '删除此补充阅读';
      delBtn.style.cssText = 'border:none;background:none;color:#c44;cursor:pointer;font-size:0.7rem;padding:4px 8px;font-family:inherit;';
      delBtn.onclick = function(e){ e.stopPropagation(); deleteSupplement(si); };
      row.appendChild(delBtn);
    }
    li.appendChild(row); suppList.appendChild(li);
  });
  // Add button
  var addLi = document.createElement('li'); addLi.className = 'day-item';
  var addBtn = document.createElement('button');
  addBtn.className = 'day-link';
  addBtn.innerHTML = '<span class="dot" style="background:#5a7a6f;"></span><span class="day-title" style="color:var(--accent-cn);">+ 新增补充阅读</span>';
  addBtn.onclick = function(){ addSupplement(); };
  addLi.appendChild(addBtn); suppList.appendChild(addLi);
  suppGroup.appendChild(suppList);
  $dayNav.appendChild(suppGroup);
}

var currentView = 'day'; // 'day' or 'supplement'
var currentSuppIndex = 0;

function switchToSupplement(index) {
  currentView = 'supplement';
  currentSuppIndex = index;
  renderSidebar();
  renderSupplement();
  closeSidebar();
}

function switchToDay(dayIndex) {
  saveCurrentContent();
  currentView = 'day';
  currentDay = dayIndex;
  localStorage.setItem(STORAGE_PREFIX + 'currentDay', DAYS[dayIndex].day);
  renderSidebar();
  renderMain();
  renderCalendar();
  closeSidebar();
}

function renderMain() {
  if (currentView === 'supplement') { renderSupplement(); return; }
  document.getElementById('cardsGrid').style.display = '';
  document.getElementById('supplementView').style.display = 'none';
  const d = DAYS[currentDay];
  $dayNum.textContent = d.day;
  var customTitle = localStorage.getItem(STORAGE_PREFIX + 'd' + d.day + '_title');
  if ($dayTitleBoth) $dayTitleBoth.textContent = customTitle || (d.titleEn + ' / ' + d.titleCn);
  var ct = localStorage.getItem(STORAGE_PREFIX + 'd' + d.day + '_title');
  document.title = `Day ${d.day} · ` + (ct || (d.titleEn + ' / ' + d.titleCn)) + ` — 阅读日志`;

  $prevBtn.disabled = currentDay === 0;
  $nextBtn.disabled = currentDay === DAYS.length - 1;

  const data = loadDay(currentDay);
  textareaIds.forEach(field => {
    textareas[field].innerHTML = data[field];
    autoResize(textareas[field]);
  });

  updateDayDateInput();
  updateDoneCheckbox();
  $contentScroll.scrollTop = 0;
}

function navigateDay(delta) {
  if (currentView === 'supplement') {
    var si = currentSuppIndex + delta;
    if (si >= 0 && si < getSupplements().length) switchToSupplement(si);
    return;
  }
  const newIdx = currentDay + delta;
  if (newIdx >= 0 && newIdx < DAYS.length) {
    switchToDay(newIdx);
  }
}

function updateProgress() {
  const completed = countCompletedDays();
  const pct = Math.round((completed / DAYS.length) * 100);
  $progressBar.style.width = pct + '%';
  $progressText.textContent = `已完成 ${completed} / 78 天`;
  // Update dots in sidebar
  renderSidebarDotForDay(currentDay);
  // Re-render all sidebar dots
  document.querySelectorAll('.day-link').forEach(link => {
    var numEl = link.querySelector('.day-num');
    if (!numEl) return; // skip supplement links
    const dayNum = parseInt(numEl.textContent.replace('Day ',''));
    const idx = DAYS.findIndex(d => d.day === dayNum);
    if (idx >= 0) {
      const dot = link.querySelector('.dot');
      if (dot) {
        dot.className = 'dot ' + (isDayComplete(idx) ? 'filled' : '');
      }
    }
  });
  // Refresh calendar dots
  renderCalendar();
}

function renderSidebarDotForDay(dayIndex) {
  // Just update the whole sidebar for consistency — called from updateProgress already
}

function getDayDate(dayIndex) {
  return localStorage.getItem(STORAGE_PREFIX + 'd' + DAYS[dayIndex].day + '_date') || null;
}
function setDayDate(dayIndex, dateStr) {

function clearDayDate(dayIndex) {

function updateDayDateInput() {

function renderSupplement() {
  var si = currentSuppIndex;
  var supplements = getSupplements();
  var s = supplements[si];
  if (!s) { switchToDay(0); return; }
  $dayNum.textContent = '📚';
  $dayTitleBoth.textContent = s.author;
  document.title = s.author + ' — 补充阅读';
  $prevBtn.disabled = si === 0;
  $nextBtn.disabled = si === supplements.length - 1;

  document.getElementById('cardsGrid').style.display = 'none';
  var view = document.getElementById('supplementView');
  view.style.display = 'block';

  var html = '<div class="supp-card">';
  html += '<h2 class="supp-title"><div class="editable" contenteditable="true" id="suppTitleEdit" onblur="saveSuppTitle(' + si + ')" style="min-height:auto;padding:4px 8px;font-weight:700;font-size:1.1rem;">' + s.title + '</div></h2>';

function suppKey(suppIndex) {
  return STORAGE_PREFIX + 'supp_content_' + suppIndex;
}
function suppMetaKey() {
  return STORAGE_PREFIX + 'supplements';
}

function autoSaveSuppContent(si) {
  clearTimeout(window._suppSaveTimer);
  window._suppSaveTimer = setTimeout(function(){
    var el = document.getElementById('suppContentEdit');
    if (!el) return;
    var val = el.innerHTML;
    if (val && val.replace(/\s/g,'') !== '') {
      localStorage.setItem(suppKey(si), val);
    } else {
      localStorage.removeItem(suppKey(si));
    }
  }, 500);
}

function saveSuppTitle(si) {
  var el = document.getElementById('suppTitleEdit');
  if (!el) return;
  var val = el.textContent.trim();
  if (!val) return;
  var supplements = getSupplements();
  supplements[si].title = val;
  saveSupplementsMeta(supplements);
  renderSidebar();
}

function saveSupplementsMeta(supplements) {
  var customs = [];
  for (var i = DEFAULT_SUPPLEMENTS.length; i < supplements.length; i++) {
    customs.push(supplements[i]);
  }
  if (customs.length > 0) {
    localStorage.setItem(suppMetaKey(), JSON.stringify(customs));
  } else {
    localStorage.removeItem(suppMetaKey());
  }
}

function addSupplement() {
  var author = prompt('作者/书名：', '');
  if (!author || !author.trim()) return;
  var supplements = getSupplements();
  supplements.push({ id: 'custom_' + Date.now(), author: author.trim(), title: author.trim(), content: '' });
  saveSupplementsMeta(supplements);
  switchToSupplement(supplements.length - 1);
}

function deleteSupplement(si) {
  var supplements = getSupplements();
  if (si < DEFAULT_SUPPLEMENTS.length) return;
  if (!confirm('删除「' + supplements[si].author + '」？此操作不可撤销。')) return;
  localStorage.removeItem(suppKey(si));
  supplements.splice(si, 1);
  saveSupplementsMeta(supplements);
  currentSuppIndex = 0;
  renderSidebar();
  switchToSupplement(0);
}

function renderCalendar() {
  const container = document.getElementById('calCells');
  if (!container) return;
  container.innerHTML = '';

  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let lastMonth = -1, lastYear = -1;
  const today = new Date();
  today.setHours(0,0,0,0);

  DAYS.forEach((d, idx) => {
    const dateStr = getDayDate(idx);

    // Insert month separator if this day has a date and it's a new month
    if (dateStr) {
      const dt = new Date(dateStr + 'T00:00:00');
      const m = dt.getMonth(), y = dt.getFullYear();
      if (m !== lastMonth || y !== lastYear) {
        lastMonth = m; lastYear = y;
        const sep = document.createElement('span');
        sep.className = 'cal-strip-month-sep';
        container.appendChild(sep);
        const label = document.createElement('span');
        label.className = 'cal-strip-month-label';
        label.textContent = y + '年' + monthNames[m];
        container.appendChild(label);
      }
    }

    const cell = document.createElement('button');
    cell.className = 'cal-strip-cell';
    cell.textContent = d.day;
    if (dateStr) {
      cell.title = 'Day ' + d.day + ' — ' + d.titleEn + ' / ' + d.titleCn + ' [' + dateStr + ']';
      // Check if this date is today
      const dt = new Date(dateStr + 'T00:00:00');
      if (dt.getTime() === today.getTime()) {
        cell.classList.add('today-mark');
      }
    } else {
      cell.title = 'Day ' + d.day + ' — ' + d.titleEn + ' / ' + d.titleCn + ' (未设日期)';
    }
    if (isDayComplete(idx)) cell.classList.add('filled');
    if (idx === currentDay) cell.classList.add('current');

    cell.onclick = () => switchToDay(idx);
    container.appendChild(cell);
  });
}

const saveTimers = {};

  if (!ta) return;
  requestAnimationFrame(function(){
    ta.style.height = 'auto';
    var h = ta.scrollHeight;
    if (h < 80) h = 80;
    ta.style.height = h + 'px';
  });
}

});

function showToolbarFor(el) {

}
function hideToolbar() {

  setTimeout(function(){

function fmt(cmd) {
  if (!activeEditor) return;
  activeEditor.focus();
  if (cmd === 'highlight') {
    // Toggle highlight: wrap selection in <span class="hl">
    var sel = window.getSelection();
    if (!sel.rangeCount) return;
    var range = sel.getRangeAt(0);
    if (range.collapsed) return; // nothing selected
    // Check if already inside a .hl span
    var node = range.commonAncestorContainer;
    var hlSpan = node.nodeType===3 ? node.parentElement.closest('.hl') : node.closest('.hl');
    if (hlSpan) {
      // Remove highlight: unwrap
      var parent = hlSpan.parentNode;
      while (hlSpan.firstChild) parent.insertBefore(hlSpan.firstChild, hlSpan);
      parent.removeChild(hlSpan);
      parent.normalize();
    } else {
      // Wrap in highlight span
      var span = document.createElement('span');
      span.className = 'hl';
      try { range.surroundContents(span); } catch(e) {
        // Fallback for complex selections
        var contents = range.extractContents();
        span.appendChild(contents);
        range.insertNode(span);
      }
    }
    sel.removeAllRanges();
  } else {
    document.execCommand(cmd, false, null);
  }
  activeEditor.dispatchEvent(new Event('input', {bubbles:true}));
  activeEditor.focus();
}

// Keyboard: Ctrl+B/I/U for formatting; Arrow keys for navigation (only when NOT editing)
document.addEventListener('keydown', e => {
  if (e.ctrlKey && (e.key === 'b' || e.key === 'i' || e.key === 'u')) {
    // Allow default browser behavior for contenteditable (execCommand)
    return;
  }
  if (document.activeElement && document.activeElement.isContentEditable) return;
  if (e.key === 'ArrowLeft') navigateDay(-1);
  if (e.key === 'ArrowRight') navigateDay(1);
});

function stripHtml(html) {
  if (!html) return '';
  var div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent || div.innerText || '';
}

function exportAll() {
  saveCurrentContent();
  let output = '';
  output += '═══════════════════════════════════════════\n';
  output += '  Reality Transurfing 阅读日志\n';
  output += '  78天 · 重新创造现实\n';
  output += '  导出日期: ' + new Date().toLocaleDateString('zh-CN') + '\n';
  output += '═══════════════════════════════════════════\n\n';

  DAYS.forEach((d, idx) => {
    const data = loadDay(idx);
    const hasContent = textareaIds.some(f => data[f] && stripHtml(data[f]).trim());
    if (!hasContent) return;

    const studyDate = getDayDate(idx);
    output += '───────────────────────────────────────────\n';
    output += `Day ${d.day} — ${d.titleEn} / ${d.titleCn}`;
    if (studyDate) output += ` [学习日期: ${studyDate}]`;
    output += '\n';
    output += '───────────────────────────────────────────\n\n';

    const fields = [
      ['【Principle】', 'principleEn'],
      ['【Interpretation】', 'interpretationEn'],
      ['【原则】', 'principleCn'],
      ['【解读】', 'interpretationCn'],
      ['【疑问】', 'questions'],
      ['【反思】', 'reflections'],
      ['【总结】', 'summary']
    ];
    fields.forEach(function(f) {
      var txt = stripHtml(data[f[1]]).trim();
      if (txt) output += f[0] + '\n' + txt + '\n\n';
    });
    output += '\n';
  });

  // Download
  const blob = new Blob([output], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Reality_Transurfing_阅读日志_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function importAll(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    // Parse the exported format: look for "Day N — TitleEn / TitleCn" markers
    const dayBlocks = text.split(/───────────────────────────────────────────\nDay \d+ — /);
    if (dayBlocks.length < 2) {
      alert('文件格式不正确，无法导入。');
      return;
    }
    let imported = 0;
    for (let i = 1; i < dayBlocks.length; i++) {
      const block = dayBlocks[i];
      // Extract day number from the header line
      const headerMatch = block.match(/^(\d+)/);
      if (!headerMatch) continue;
      const dayNum = parseInt(headerMatch[1]);
      const idx = DAYS.findIndex(d => d.day === dayNum);
      if (idx < 0) continue;

      // Extract study date from header line: [学习日期: YYYY-MM-DD]
      const dateMatch = block.match(/\[学习日期:\s*(\d{4}-\d{2}-\d{2})\]/);
      if (dateMatch) {
        localStorage.setItem(STORAGE_PREFIX + 'd' + dayNum + '_date', dateMatch[1]);
      }

      // Extract each section
      const sections = {
        principleEn:      extractSection(block, '【Principle】'),
        interpretationEn: extractSection(block, '【Interpretation】'),
        principleCn:      extractSection(block, '【原则】'),
        interpretationCn: extractSection(block, '【解读】'),
        questions:        extractSection(block, '【疑问】'),
        reflections:      extractSection(block, '【反思】'),
        summary:          extractSection(block, '【总结】'),
      };
      // Also try old format markers for backward compat
      if (!sections.principleEn.trim()) sections.principleEn = extractSection(block, '【English Original】');
      if (!sections.principleCn.trim()) sections.principleCn = extractSection(block, '【中文翻译】');

      let saved = false;
      for (const [field, value] of Object.entries(sections)) {
        if (value.trim()) {
          localStorage.setItem(storageKey(idx, field), value.trim());
          saved = true;
        }
      }
      if (saved) imported++;
    }
    fileInput.value = '';
    renderSidebar();
    renderMain();
    updateProgress();
    alert('导入完成！已恢复 ' + imported + ' 天的内容。');
  };
  reader.readAsText(file, 'utf-8');
}

function extractSection(text, marker) {
  const startIdx = text.indexOf(marker);
  if (startIdx === -1) return '';
  const afterMarker = text.substring(startIdx + marker.length);
  // Find the next section marker or day separator
  const nextMarkers = ['【Principle】','【Interpretation】','【English Original】','【原则】','【解读】','【中文翻译】','【疑问】','【反思】','【总结】','───────────────────────────────────────────','═══════════════════════════════════════════'];
  let endIdx = afterMarker.length;
  for (const m of nextMarkers) {
    const pos = afterMarker.indexOf(m);
    if (pos !== -1 && pos < endIdx) endIdx = pos;
  }
  return afterMarker.substring(0, endIdx).trim();
}

function resetAll() {
  if (!confirm('确认要清除所有 78 天的本地保存内容吗？此操作不可撤销。')) return;
  for (let i = 0; i < DAYS.length; i++) {
    textareaIds.forEach(field => {
      localStorage.removeItem(storageKey(i, field));
    });
    localStorage.removeItem(STORAGE_PREFIX + 'd' + DAYS[i].day + '_date');
    localStorage.removeItem(doneKey(i));
  }
  localStorage.removeItem(STORAGE_PREFIX + 'currentDay');
  // Clear supplement data
  var supps = getSupplements();
  for (var si = 0; si < supps.length; si++) {
    localStorage.removeItem(suppKey(si));
  }
  localStorage.removeItem(suppMetaKey());
  document.getElementById('dayDateInput').value = '';
  document.getElementById('dayDateClear').classList.remove('has-date');
  renderSidebar();
  renderMain();
  renderCalendar();
  updateProgress();
}

  if (!container) return;
  if (msgs.length === 0) {
    container.innerHTML = '<div class="chat-msg assistant">输入你想问的问题，点击发送。我会把当前 Day 的 Principle + Interpretation 连同你的问题一起复制，然后打开 ChatGPT 网页。你在 ChatGPT 里 Ctrl+V 粘贴即可。</div>';
  } else {
    container.innerHTML = msgs.map(function(m){
      return '<div class="chat-msg user">' + m.content.replace(/\n/g,'<br>') + '</div>';
    }).join('');
  }
  container.scrollTop = container.scrollHeight;
}

function addChatQuestion(content) {
  var msgs = loadChatHistory();
  msgs.push({ content: content });
  if (msgs.length > 30) msgs = msgs.slice(msgs.length - 30);
  saveChatHistory(msgs);
  renderChat();
}

function buildChatPrompt(userQuestion) {
  var d = DAYS[currentDay];
  var prompt = '我在读 Vadim Zeland 的《Transurfing in 78 Days》。\n\n';
  prompt += '现在是 Day ' + d.day + '：' + d.titleEn + ' / ' + d.titleCn + '\n\n';
  var pe = (textareas['principleEn'].innerHTML || '').replace(/<[^>]*>/g,'').trim();
  var ie = (textareas['interpretationEn'].innerHTML || '').replace(/<[^>]*>/g,'').trim();
  var pc = (textareas['principleCn'].innerHTML || '').replace(/<[^>]*>/g,'').trim();
  var ic = (textareas['interpretationCn'].innerHTML || '').replace(/<[^>]*>/g,'').trim();
  if (pe) prompt += '=== Principle ===\n' + pe + '\n\n';
  if (ie) prompt += '=== Interpretation ===\n' + ie + '\n\n';
  if (pc) prompt += '=== 原则（中文）===\n' + pc + '\n\n';
  if (ic) prompt += '=== 解读（中文）===\n' + ic + '\n\n';
  prompt += '---\n';
  prompt += '请用中文回复。我的问题是：\n' + userQuestion;
  return prompt;
}

function sendChat() {
  var input = document.getElementById('chatInput');
  var userMsg = input.value.trim();
  if (!userMsg) return;

  addChatQuestion(userMsg);
  var fullPrompt = buildChatPrompt(userMsg);

  // Copy to clipboard
  var targetUrl = chatModel === 'deepseek' ? 'https://chat.deepseek.com' : 'https://chatgpt.com';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(fullPrompt).then(function(){
      window.open(targetUrl, '_blank');
    }).catch(function(){
      fallbackCopy(fullPrompt, targetUrl);
    });
  } else {
    fallbackCopy(fullPrompt, targetUrl);
  }

  input.value = '';
}

function fallbackCopy(text, url) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  window.open(url, '_blank');
}

/* ============================================
   GITHUB GIST CLOUD SYNC
   ============================================ */
var gistTokenKey = STORAGE_PREFIX + 'gist_token';
var gistIdKey = STORAGE_PREFIX + 'gist_id';
var cloudEnabled = false;

function getGistToken() { return localStorage.getItem(gistTokenKey) || ''; }
function getGistId() { return localStorage.getItem(gistIdKey) || ''; }

function setupCloud() {
  var token = prompt('请输入 GitHub Personal Access Token（仅需设置一次）：\n\n获取方式：github.com → Settings → Developer settings → Personal access tokens → Generate new token（选 classic）→ 勾选 gist 权限 → 生成后复制到这里', getGistToken());
  if (!token || !token.trim()) return;
  token = token.trim();
  localStorage.setItem(gistTokenKey, token);
  cloudEnabled = true;
  updateCloudUI();
  alert('Token 已保存！数据将自动同步到 GitHub Gist。\n\n换设备时：输入相同的 Token，点 ☁️ 下载按钮即可恢复数据。');
}

function disableCloud() {
  if (!confirm('断开云同步？本地数据不会丢失。')) return;
  localStorage.removeItem(gistTokenKey);
  localStorage.removeItem(gistIdKey);
  cloudEnabled = false;
  updateCloudUI();
}

function updateCloudUI() {
  var btn = document.getElementById('cloudBtn');
  var info = document.getElementById('cloudInfo');
  if (cloudEnabled) {
    if (btn) btn.textContent = '☁️';
    if (info) info.textContent = '云同步中';
  } else {
    if (btn) btn.textContent = '☁️';
    if (info) info.textContent = '';
  }
  var setupBtn = document.getElementById('cloudSetupBtn');
  if (setupBtn) setupBtn.textContent = cloudEnabled ? '设置' : '设置';
}

function collectAllData() {
  var payload = {
    days: {},
    supplements: { customs: localStorage.getItem(suppMetaKey()) || null },
    suppContents: {},
    currentDay: localStorage.getItem(STORAGE_PREFIX + 'currentDay') || '1',
    focusMode: localStorage.getItem(STORAGE_PREFIX + 'focusMode') || '0'
  };
  for (var i = 0; i < DAYS.length; i++) {
    var d = DAYS[i];
    var entry = {};
    textareaIds.forEach(function(f){
      var v = localStorage.getItem(storageKey(i, f));
      if (v) entry[f] = v;
    });
    var done = localStorage.getItem(doneKey(i));
    if (done) entry._done = done;
    var sd = localStorage.getItem(STORAGE_PREFIX + 'd' + d.day + '_date');
    if (sd) entry._date = sd;
    var t = localStorage.getItem(STORAGE_PREFIX + 'd' + d.day + '_title');
    if (t) entry._title = t;
    if (Object.keys(entry).length > 0) payload.days['d' + d.day] = entry;
  }
  // Supplement contents
  var supps = getSupplements();
  for (var si = 0; si < supps.length; si++) {
    var sc = localStorage.getItem(suppKey(si));
    if (sc) payload.suppContents['s' + si] = sc;
  }
  return payload;
}

function restoreAllData(payload) {
  if (!payload) return;
  if (payload.currentDay) localStorage.setItem(STORAGE_PREFIX + 'currentDay', payload.currentDay);
  if (payload.focusMode) localStorage.setItem(STORAGE_PREFIX + 'focusMode', payload.focusMode);
  if (payload.supplements && payload.supplements.customs) localStorage.setItem(suppMetaKey(), payload.supplements.customs);
  if (payload.suppContents) {
    Object.keys(payload.suppContents).forEach(function(k){
      localStorage.setItem(STORAGE_PREFIX + 'supp_content_' + k.replace('s',''), payload.suppContents[k]);
    });
  }
  if (payload.days) {
    Object.keys(payload.days).forEach(function(dk){
      var entry = payload.days[dk];
      var dayNum = parseInt(dk.replace('d',''));
      var idx = DAYS.findIndex(function(x){ return x.day === dayNum; });
      if (idx < 0) return;
      textareaIds.forEach(function(f){
        if (entry[f]) localStorage.setItem(storageKey(idx, f), entry[f]);
      });
      if (entry._done) localStorage.setItem(doneKey(idx), entry._done);
      if (entry._date) localStorage.setItem(STORAGE_PREFIX + 'd' + dayNum + '_date', entry._date);
      if (entry._title) localStorage.setItem(STORAGE_PREFIX + 'd' + dayNum + '_title', entry._title);
    });
  }
  renderSidebar();
  renderMain();
  renderCalendar();
  updateProgress();
}

function uploadToCloud() {
  if (!cloudEnabled) return;
  var token = getGistToken();
  if (!token) return;
  var gistId = getGistId();
  var payload = collectAllData();
  var content = JSON.stringify(payload, null, 2);
  var filename = 'transurfing-78-data.json';

  var url, method;
  if (gistId) {
    url = 'https://api.github.com/gists/' + gistId;
    method = 'PATCH';
  } else {
    url = 'https://api.github.com/gists';
    method = 'POST';
  }
  var body = JSON.stringify({
    description: 'Transurfing in 78 Days — 阅读数据',
    public: false,
    files: {}
  });
  body = JSON.parse(body);
  body.files[filename] = { content: content };
  body = JSON.stringify(body);

  fetch(url, {
    method: method,
    headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
    body: body
  }).then(function(r){ return r.json(); }).then(function(data){
    if (data.id && !gistId) {
      localStorage.setItem(gistIdKey, data.id);
    }
  }).catch(function(e){ console.log('Upload error:', e); });
}

function downloadFromCloud() {
  var token = getGistToken();
  if (!token) { alert('请先点击 ☁️ 旁边的"设置"按钮，输入 GitHub Token。'); return; }
  var gistId = getGistId();
  if (!gistId) {
    // Try to find the gist
    fetch('https://api.github.com/gists', {
      headers: { 'Authorization': 'token ' + token }
    }).then(function(r){ return r.json(); }).then(function(gists){
      var found = null;
      for (var i = 0; i < gists.length; i++) {
        if (gists[i].description && gists[i].description.indexOf('Transurfing') >= 0) {
          found = gists[i]; break;
        }
      }
      if (found) {
        localStorage.setItem(gistIdKey, found.id);
        fetchGistContent(found.id, token);
      } else {
        alert('未找到云端备份。上传一次数据后即可在别的设备下载。');
      }
    }).catch(function(e){ alert('请求失败，请检查 Token 是否正确。'); });
    return;
  }
  fetchGistContent(gistId, token);
}

function fetchGistContent(gistId, token) {
  fetch('https://api.github.com/gists/' + gistId, {
    headers: { 'Authorization': 'token ' + token }
  }).then(function(r){ return r.json(); }).then(function(data){
    var filename = 'transurfing-78-data.json';
    var file = data.files && data.files[filename];
    if (!file || !file.content) { alert('云端数据为空。'); return; }
    try {
      var payload = JSON.parse(file.content);
      restoreAllData(payload);
      alert('数据已从云端恢复！');
    } catch(e) { alert('数据解析失败。'); }
  }).catch(function(e){ alert('下载失败: ' + e.message); });
}

saveField = function(dayIndex, field, value) {
  _origSaveField2(dayIndex, field, value);
  clearTimeout(window._cloudUploadTimer);

function init() {
  const savedDay = localStorage.getItem(STORAGE_PREFIX + 'currentDay');
  if (savedDay !== null) {
    const dayNum = parseInt(savedDay);
    const idx = DAYS.findIndex(d => d.day === dayNum);
    if (idx >= 0) currentDay = idx;
  }
  try { renderSidebar(); } catch(e) { alert('renderSidebar错误: '+e.message); return; }
  try { renderMain(); } catch(e) { alert('renderMain错误: '+e.message); return; }
  try { renderCalendar(); } catch(e) { alert('renderCalendar错误: '+e.message); return; }
  try { updateProgress(); } catch(e) { alert('updateProgress错误: '+e.message); return; }
  localStorage.setItem(STORAGE_PREFIX + 'currentDay', DAYS[currentDay].day);
  restoreFocusMode();
}
