var PRESET_DATA = {};
PRESET_DATA[1]={p:"Wake up, right here, right now! Be aware and remember that everyone is a dreamer and everything that is happening around you is nothing more than a dream, only the dream no longer has any control over you. Now that you have woken up in the dream, you can influence how events will unfold. Your advantage lies in awareness. Feel your strength. Strength is always yours when you remember it. From now on, everything will be as you want it to be.",i:"Your birth into this life represents a new awakening after a series of past incarnations, dreams about reality. From the moment you appeared in the world, you have had amazing abilities. You could hear the rustling of the morning stars, see auras and communicate with birds and animals. The entire world was an astonishing extravaganza of luminous energy and you were the magician, capable of controlling it. However, you soon fell once again under the influence of others and were plunged into a dream. The dreamers constantly and intentionally focused your attention on the physical aspect of reality. As a result, your magical abilities were lost. Have you ever felt as if life were a dream in which reality is controlling you, rather than you controlling it? The time has come to reclaim your former power."};
PRESET_DATA[2]={p:"Right now, embrace the awareness that your life is a game, which you have been pushed into playing. While you are mentally engrossed in the game, you can't objectively evaluate a situation or influence the course of events in any significant way. So first, come down into the audience hall, take a good, calm look at everything around you and say to yourself, \"In this moment, I am fully awake and aware of where I am, what is happening, what I am doing and why\". Then walk back onto the stage and continue playing your role while remaining the witness, like any other member of the audience. Now you have a huge advantage — awareness. You have hacked the game and acquired the ability to control it.",i:"When you dream, you are at the mercy of circumstance. The rational mind sleeps and accepts everything at face value as if everything were unfolding as it should. Waking life is pretty much the same. You might tend to think that reality is something that exists independently, and that you are powerless to influence it. You are mostly resigned to your lot, the set of capabilities given to you and the conditions of the environment in which you have to exist. All you can do is go with the flow that of fate, from time to time, making minor attempts to assert your rights. Is it really possible to change things? Too right, it is! And you will. Until now, you have probably perceived reality as you were taught to. Now, be aware that reality is like a dream. You can only control the situation through lucid dreaming. On stage, everyone is playing a role and all the actors are interacting with you in one way or another. They might expect something of you, make impositions, requests and demands; they may help, obstruct, love or hate you. Look at the game consciously, from a distance, and then you will understand it all."};
PRESET_DATA[3]={p:"There is a small particle of God in every one of us. You are a child of God and your life is God's dream. By shaping your own reality with the power of intention, you fulfil God's will. Your intention is God's intention. As this is the case, how can you doubt that your intention will be realised? All it takes is to claim the right. When you ask God for something, it is just the same as if God had asked something of himself. Can God really ask something of his or her self? Is there any one person alive from whom God would ask for something for himself or herself? God just takes what he (she) wants. Do not ask, demand or strive. Shape your own reality by way of conscious intention.",i:"The world is a theatre of dreams in which God is simultaneously a member of the audience, an actor, a scriptwriter, and a producer. As a member of the audience, God observes the play that is unfolding on the stage of the world. As an actor, God feels and experiences everything in the same way as the character whose role he (she) is playing. God creates and controls reality through the intention of all living things. God placed a part of his will together with the soul in every living being and then sent them out into the dream, into life. God gave every living soul the freedom and power to create their own reality by the measure of their awareness. Practically all living beings omit to use the power of intention consciously and with clear purpose. In a state of non-lucid dreaming, it is as if they are vaguely aware of wanting something without really knowing what exactly. Their intentions are therefore blurred, vague and mostly unconscious. In this respect, man has developed little more than animals. The pendulums have not only succeeded in taking away people's awareness of their own abilities, they have perverted the very meaning of life, replacing the notion of being used of God, with worship, whereas in fact, the true goal of life and the idea of service of God consists in co-creation, creation together with God."};
PRESET_DATA[4]={p:"In order to achieve real success, you have to stop following widely accepted stereotypes and walk your own path. Anyone who pulls out of the general system creates a new measure of success. Pendulums cannot bear individuality. They spot a rising star and have no choice but to make of them a favourite. Once a new rule has been established, the ranks make a U-turn and start following the rising star. In order to establish your own rules, you have to be yourself. You can do it. You simply have to claim the privilege. Only you can decide what privileges you may or may not enjoy.",i:"People spend their entire lives being told they are far from perfect, and that success, wealth and fame are the inheritance of the elite. Pendulums do not deny that anyone can succeed but they do carefully hide the fact that everyone has their own unique qualities and abilities. For the pendulums, individuality is like death itself. If all its adherents were to become free individuals shaking off the strings of control, the pendulum would simply fall apart. Stars are born independently but the pendulums light them up. The role model, the standard of success, is created intentionally, to drive the aspirations of the mass in one direction. In other words, the pendulum's task is to drive everyone into a single rank and force them to obey a common rule. You will achieve nothing until you realise that you have to step out of the rank and file. There is no point in playing someone else's game where you are not the one making up the rules. Whatever you do, always initiate your own game. This is the secret of success."};
PRESET_DATA[5]={p:"The world is what you think of it. The world is a mirror that reflects your relationship to it. Life is a game in which the world puts the same riddle to all its inhabitants: \"Ok, guess, what do I look like?\" Everyone responds in their own way according to their own perception: \"You are aggressive,\" or \"you are cozy,\" or even \"cheerful, gloomy, friendly, hostile, happy, illfated.\" The interesting thing is that in this quiz, everyone is a winner. The world agrees with everyone and appears before each according to the guise that was ordered. What do you think of your world?",i:"When a person is convinced that all the best things in this world have already sold out, their shelves will remain empty. When they think that buying a high-quality item will mean standing in a huge queue and then parting with a large sum of money then that is exactly what will happen. If a person's expectations are pessimistic and riddled with doubt, then they will undoubtedly be justified. If a person expects to meet with an unfriendly environment, their misgivings will be proven true. However, when a person is imbued with the innocent thought that the world has reserved the best in life for them, this also works. The eccentric, who does not know that nothing can be achieved without a struggle, somehow finds himself or herself at the counter, where there has just been a fresh delivery as if timed especially for them. Then they suddenly learn that the first buyer gets everything for free. A long queue forms behind them of people who know that the reality of life is pretty miserable and all the other fools were just lucky. If someday when confronted with the 'realities of life' the lucky eccentric changes their opinion of the world, their reality will change accordingly and when they finally \"open their eyes to the truth,\" they will be thrown right to the very back of the queue."};
PRESET_DATA[6]={p:"Whatever thoughts you send out into the world, they will return to you like a boomerang. What happens when you hate something? You put your heart and mind into a sense of hatred, and this clear, sharp image is reflected in the mirror and fills the entire layer of your world. As a result, you get even more worked up and increase the power of your emotion. In your mind, you feel like sending everyone to hell. \"Get lost the lot of you!\" But the mirror sends the boomerang back. You tell everyone where to get off and life sends you there instead. Beware of sending negative energy into the world mirror. If you do, you will receive the same response totally unexpectedly. By the way, love is also a boomerang!",i:"Thoughts materialise in the world mirror. For example, if you are not satisfied with your outward appearance, you will take no pleasure in looking in the mirror. You focus all your attention on the features you do not like about yourself and you state them as a fact. You have to understand that how you are reflected in the mirror corresponds to how you feel about yourself. Adopt a new rule: don't look in the mirror, peek in the mirror. Seek out the positive and ignore everything else. Pass everything you see through this filter. Concentrate your attention on the things you want. What did you use to do? You stated facts like, \"I don't like myself. I don't like my world.\" The mirror simply confirmed the fact all the more, \"It's true, that's how it is.\" Now you have a different task. Seek out the things you love and at the same time, picture the desired image in your mind. From now on, all you do is seek out and find signs that confirm evidence of positive change. You'll find that things will get better and better with each passing day. If you practice this regularly, it won't be long before your jaw will be dropping in amazement."};
PRESET_DATA[7]={p:"People are like the little kitten that stands in front of the mirror not realising that it is looking at its own image. You might think you are at the hands of circumstance, which you are incapable of changing but this is an illusion, fake prop, which you can easily dispel if you want to. Unconsciously, you are going round in circles. You observe reality and express your relationship to it; the mirror confirms the content of your relationship to reality in waking life. It is like a closed-loop feedback system. Reality is created as a reflection of your thought forms and the nature of the thought form is, in turn, largely defined by the reflection you see in the mirror. The principle of creating your own reality lies in turning the loop in the opposite direction. Look at yourself first and only then in the mirror.",i:"When a person is attached to the mirror by their relationship to the world (a primitive response to reality), they try to chase after the reflection (equally as primitive) in an attempt to change some aspect of it. Now let's try and turn the mirror circle backwards. First, we express our relationship to the world - the mirror consolidates the content of this relationship in reality - and then we observe reality. What do we get as a result? There is no longer a primitive and powerless assertion about the reflection. This is replaced instead by a deliberate, purposeful assertion of the thought form. Instead of habitually expressing dissatisfaction about what you see in the mirror, turn away from it and start creating a picture in your mind of what you would like to see. That is the way out of the mirror maze. The world first stops and then starts to meet you half way. When you take control of your relationship to reality, outer intention will begin to work, and for outer intention, there is nothing that cannot be realised. All you have to do is switch your attention from the reflection to the image in front of it. In other words, take control of your thoughts. Don't think about the things you don't want and try to avoid; think about the things you do want and are striving to achieve."};
PRESET_DATA[8]={p:"There are many corners of paradise in the world inhabited by 'Pink Twins'. If you want to go to one of these places, put on your 'rose-coloured glasses' and ignore everyone who tells you to remove them. The echoes of paradise rarely penetrate into everyday life. When they do, catch hold of those 'sun dogs' and keep them in your focus. They will start to appear in your life more frequently and then you will see for yourself how the layer of your world begins unexpectedly to transform.",i:"Have you ever seen it rain on a sunny day? What about two rainbows in the sky? Have you ever crossed paths with twins in pink? It is important to understand one simple thing. Whether you decorate your world in bright, rainbow colours or the darkest of shades depends entirely on your relationship to it. If the majority of your thoughts are related to negative experiences, life will get worse as each day goes by. The opposite is also true. If your soul 'sings in the rain' and 'splashes in the puddles' even when the weather is bad, the layer of your world will be filed with constant celebration. Heaven and hell do not exist somewhere out there in another dimension but here on Earth. There are places like prisons, for example, but that is not where you are; that's not your world, and yet it could become your world if you focus your attention on criminal information. Then there are events like accidents, catastrophes, natural disasters; these too could become part of your reality if you start internalising the news reports. Focus your attention deliberately and solely on the things you want to see in your world. Turn away from everything else. Close your eyes and ears to it all. Evil will never disappear from reality altogether, but it can vanish from your layer of the world. You will simply stop encountering negativity.",pc:"世界上有许多'粉红双胞胎'居住的伊甸园角落。如果你想去这些地方之一，戴上你的'玫瑰色眼镜'，无视那些叫你摘掉它的人。天堂的回音很少穿透日常生活。但当它们穿透时，抓住那些'幻日'，把它们留在你的焦点里。它们会开始更频繁地出现在你的生活中，然后你会亲眼看到，你的世界层次开始出人意料地转变。",ic:"你有没有见过晴天下的雨？天上有两道彩虹？你有没有遇到过穿粉红色的双胞胎？理解一件简单的事很重要：你是用明亮彩虹色还是最暗的阴影来装饰你的世界，完全取决于你对它的态度。如果你的大多数想法都与负面经历有关，生活就会一天比一天糟糕。反之亦然。如果你的灵魂'在雨中歌唱'、'在水坑里踩水'，即使天气不好，你的世界层次也会充满持续的庆祝。天堂和地狱并不存在于另一个维度的某个地方，而是在地球上。比如有监狱这样的地方——但你现在不在那里；那不是你的世界。然而，如果你把注意力集中在犯罪信息上，它就可能成为你的世界。还有像事故、灾难、自然灾害这样的事件——如果你开始内化新闻报道，它们也可能成为你现实的一部分。刻意地把你的注意力只集中在你希望在世界上看到的东西上。把其他一切转开。对它们闭上眼、捂住耳。邪恶永远不会从现实中完全消失，但它可以从你的世界层次中消失。你会简单地不再遇到负面事物。",q:"1. 和感恩日记一个意思吗？\n- 两者都是在做同一件事：主动转移注意力。\n- 感恩日记是'为已有的东西说谢谢'。第8课是'为你想要的东西，主动去找它正在发生的迹象'。\n\n2. 怎么理解pink twins？\n- 罕见的、美好的、超越常规的'巧合'或'小奇迹'。\n- '粉红'象征乐观（'透过玫瑰色眼镜看世界'）。'双胞胎'象征巧合、配对、同步性。\n- 这个世界上有些角落是'天堂'一样的存在——美好的事、幸运的巧合、恰到好处的时机。但这些事不常出现在日常生活中。当它们出现时，你要'抓住'它，把注意力放在上面。",s:"你是用明亮彩虹色还是最暗的阴影来装饰你的世界，完全取决于你对它的态度。刻意地把你的注意力只集中在你希望在世界上看到的东西上。把其他一切转开。对它们闭上眼、捂住耳。"};
PRESET_DATA[9]={p:"Transurfing is pretty much impossible unless you have relatively high energy levels. As a rule, much of our energy goes on a whole gamut of unrealised plans, which are weighing us down. Goals activate the energy of intention but only if the goal is already in the process of being realised and not a project that just hangs in limbo. It is important either to discard a number of your potential plans or to take steps towards their implementation. Let yourself go. Give yourself more freedom. Make a list of the limitations that are burdening you and shake them off. When you do list, reserves of intention energy will instantly be freed and you will be able to move forward.",i:"Many people go through life, loaded on all sides with the burden of endless responsibilities, unfinished business, harsh conditions, unfulfilled plans and umpteen goals. Take a moment to feel what is weighing you down. If you think about it, you will probably find that you can let go of several lead weights without an ounce of regret. There is no point in constantly dragging them around with you if you can't realise them all. For example, \"I have to be better than everyone else; I'll prove to myself and everyone else what I am worth; all I need is victory, otherwise, I'll stop being able to respect myself; I can't afford to make mistakes\". And there are others like, stop smoking, learn a foreign language and basically, turn over a new leaf for my entire life on Monday morning. Anything that is endlessly put off until later is excess cargo. An intention must either be realised or discarded because it consumes your energy, which it would be stupid to waste. Is there one big lead weight which you have secretly been thinking of getting rid of but have not yet quite built up the courage to take the step? Imagine how light and relieved you will feel when you have done it."};
PRESET_DATA[10]={p:"Life will give you everything you intend to have if you are convinced without reservation that it is rightfully yours. Your choice is law, subject to unconditional fulfilment. Freedom of choice, the determination to have, is created by the energy of intention. If the excess potentials of inner and outer importance consume a significant chunk of your energy, your intention will have no power. In order to let go of the seeming importance of things, be conscious of your actions and aware of the things you attribute inflated importance and the consequences of doing so. The energy of excess potential is dissipated through action. Run your goal slide in your mind and quietly place one foot in front of the other in the direction of your goal. This is all the action you need to take.",i:"How do you stop being afraid? Find a safety net, a fallback position.\nHow do you stop being anxious and worrying so much? Take action. The potentials of anxiety and worry are dissipated through action.\nHow do you stop waiting and wanting? Resign yourself to the possibility of defeat and take action. Dissolve desire and expectation through action.\nHow do you get over the issue of self-worth? Accept your worth as a statement of fact and let go of any action designed to increase it.\nHow do you stop getting so irritated? Play with the pendulum and break its game rules. By responding abnormally, you disturb the pendulum's rhythm leaving it with nothing.\nHow do you let go of feelings of guilt? Stop justifying yourself.\nHow do you cope with feelings of insult and indignation? Stop fighting and go with the variants flow.\nWhat can you do if you find it impossible to let go of feelings of resentment and anger? Allow yourself this shortcoming. Don't pressure yourself to come always out tops.\nFinally, how do you stop yourself from crumbling under the weight of serious problems? Observe the principle of coordinating intention. Instead of battling with excess potentials, take action on the grounds of purified intention. Intention is cleansed in the process of movement."};
PRESET_DATA[11]={p:"In order to acquire confidence, you must, first of all, let go of your attachment to the need to be confident. Insecurity lies in overestimating the importance of things. I don't need confidence as a crutch because if I have no importance, I have nothing to protect and nothing to gain. I have nothing to fear and nothing to worry about. If nothing is of excessive importance to me, my world is pure and transparent. I refuse to fight and choose to go with the variants flow. I am empty so I cannot be hooked. I have no need to struggle. I quietly go my own path taking what is mine along the way. This is not a position of shaky confidence so much as a matter of calm, conscious coordination.",i:"Insecurity creates a vicious circle. The more important your goal, the greater your desire to achieve it, the greater the feeling of insecurity. The more worry and anxiety you feel about something, the quicker your fears will prove justified. The battle for self-worth drains your energy. Feelings of guilt can turn a life into the wretched existence of a loser. How do you break out of this tangled maze? You can't. There is no way out. The secret of the maze is that when you stop looking for the way out and let go of the importance of things, the walls of the maze collapse all by themselves. Stop fighting to prove your sense of worth and it will surely be returned to you. Stop justifying yourself to others and you will stop feeling guilty. In the same way, if you reduce the importance you attach to external objects, you will no longer be dominated by their apparent, great significance. Finally, perfect coordination is achieved when the heart and mind are in harmony. To achieve this, listen to the dictates of your heart and stay true to your own beliefs."};
PRESET_DATA[12]={p:"When you find yourself in balance and harmony with the world around you, your life runs smoothly and pleasantly. You achieve your goals without any particular effort. Yet, when you build walls of excess potential, life becomes a battle with balancing forces. When you are faced with a difficult situation, try and recognise where you have gone over the top, what you have become obsessed with, and to what person or thing you might have attributed excessive significance. Define your worth and then let it go. The wall will come tumbling down, the obstacle will remove itself and the problem will be solved of its own accord. Do not try to overcome obstacles. Instead, drop their importance.",i:"Everything in life strives towards balance. Wherever there is excess energetic potential, balancing forces appear with the purpose of eliminating it. When you perceive something as being excessively significant, you get the opposite result to what you intended. For example, when you are critical of yourself you come into conflict with your soul. Balancing forces make you struggle with your shortcomings and try to hide them, as a result of which, they stand out even more. When you are critical of the world, you confront a large number of pendulums. Balancing forces will aim to cut you down to size and push you away. As well as dropping importance, don't push too hard. Reducing outer importance does not mean to disdain things or underestimate them. It is more about not taking life so seriously. Do not disregard things in life, but don't paint them in a saccharine veneer either. Accept the world for what it is. Reducing inner importance is nothing at all like being submissive or self-abasing. Do not embellish or belittle your own strengths and weaknesses. Just give yourself the luxury of being yourself."};
PRESET_DATA[13]={p:"What is the secret of charismatic personalities? They throw the negative slides out of their mind and replace them with positive ones. Charm is a result of the mutual love that exists between the heart and the mind. A charming personality experiences a feeling of joy in their soul; they enjoy life and bathe in their own love without the slightest hint of narcissism. It is this feeling of joy that other people notice. There are not many people like this but you can become one of them. You just have to turn to face your heart, love yourself and step onto the path towards your own personal goal. Not only do certain personal qualities then change but the body becomes more attractive too, the face more appealing and one's smile, absolutely dazzling.",i:"The secret to attractiveness lies in the unity of heart and mind. When a person accepts themselves as they really are, loves themselves and does what they love doing, they radiate an inner light and live their life true to their own credo. This is precisely what people lack and that is why they are drawn to charismatic individuals, like moths to a light bulb. On an energetic level, charm represents pure waves of unity of heart and mind. By training your energy, you develop the extraordinary ability to influence others around you and win them over. A person who has an abundance of free energy generates interest and goodwill in others. If you find it difficult to love yourself unconditionally, start doing an energy field workout by affirming the thought form, \"I am spilling over with energy. The intensity of my energy levels is increasing. I have a powerful energy field and it becomes more powerful every day. I shine with the energy of love and charm. I am a pure energy source. People sense my energy field and are well disposed towards me\". When you notice people genuinely feeling drawn towards you, don't forget to tell yourself that the technique is actually working. The rational mind needs to hear you affirming it because it is constantly in doubt: \"Can I really be capable of that?\""};
PRESET_DATA[14]={p:"If you don't love yourself, no one else will, and what's more, you will never be happy. Any conflict between the heart and mind reflects negatively on a person's appearance and character. Correspondingly, the shades of your personal world will turn ever darker. Above all, love yourself, and only then pay attention to the positive qualities of others. It is important to feel and understand the following: pendulums force you to change, to turn away from your heart and follow the rule that states, 'they are better than you, so do what they do, be like them, take your place in the matrix, be nothing more than a cog.' In reality, you are unique. Go inside, accept yourself as you really are, and assert the right to be right. Then you will have something of which you can be proud and a reason to respect yourself.",i:"Once a person has gone a long way down the road of conforming to other people's standards, it is difficult for them to start suddenly loving themselves. \"How can I love myself if I don't even like myself?\" This is pure excess potential born of inflated inner and outer importance. It is outer importance in that you perceive someone else's standards as the epitome of perfection. Are you not perhaps valuing other people's qualities too highly? Inner importance is present in forcing yourself to follow other people's standards. Who says that you are any less worthy than they are? Is your self-esteem perhaps a little too low? To love yourself, kick outer importance off the pedestal and give up the idol worship. Who is stopping you from setting your own standards? Let others chase after you instead! Drop your own inner importance and let yourself go. Give yourself the luxury of having shortcomings and focus your attention on your strengths."};
PRESET_DATA[15]={p:"If you have been ditched and are suffering from unrequited love or if you are looking for love, you must, first of all, love yourself. If you do not yet feel that you can love yourself just as you are, start taking care of yourself and focusing on your own personal development: enrol at a sports centre, commit to studying a foreign language, try dressing differently, not in your usual style, get a magic tattoo, find a magic talisman - a pendant or ring. When you start taking care of yourself, you will find a new sense of purpose. Looking after yourself could become your goal if you have not already found one. This is a truly worthy goal and it will bring you success and abundance. You deserve the very best.",i:"It is human nature that people are only pleased with themselves when other people happen to be pleased with them and that they only love themselves when others love them. And yet, the world is a mirror. How can there be love in the reflection if the image itself does not contain it? The mirror cannot reflect what isn't there. It's a vicious mirror circle. So, how do you break it? Very simply. Firstly, it is a well-known fact that we love the people we take care of. So, pay more attention to yourself, take care of yourself, take some 'me time'. Secondly, love is like a boomerang. If you send love out into the world, it will come back to you. You will experience love, including love for yourself if you shine with love instead of emanating fear, mistrust, and disapproval. If you take the first step, the reflection will meet you half way. It is basically a feedback chain: I send love out to the world – love is reflected and comes back to me – the world reciprocates – I am loved – it follows that I like myself too and begin to love myself."};
PRESET_DATA[16]={p:"'According to your faith let it be to you'. This has been said before and more than once, and it really is true. But how do you start believing it? It is useless trying to persuade or convince yourself that it is true. Instead, get down to something concrete i.e. shaping your reality according to the Transurfing principles and visualising your goal slide. Put the principles into practice and you will see what happens. Outer intention will open a door onto the world in which the impossible becomes possible. When the mind is faced with fact, it will include the inconceivable into its world-view and allow a miracle to happen. When you see that Transurfing works, you won't need to have faith. You will have knowledge instead.",i:"Transurfing gives you a map of the territory and the rules of the game. It is up to you, what you decide to do with them. You are the king (or queen) of your personal world. Do not succumb to other's influence. Believe in yourself. Don't rely on other people's decisions. You know better than anyone else what needs to happen and how. Even now that you have knowledge, you will not be immune from making mistakes. True success grows out of the ruins of your failures. Most prominent figures have been through a lot. It is just that these areas of their life tend to be glossed over. So if you have suffered a failure, rejoice, you are on the path to success. Sometimes you will feel as if circumstances are stacked against you and yet, how can you really know, exactly which path will lead you to achieve your goal? The guardians of ancient knowledge have revealed Transurfing not to try and make you believe in the reality of metaphysics but to inspire hope. Where there is faith, there is always room for doubt. We need hope so that we can start to take action. Begin to take action and you will see how things that previously seemed inconceivable begin to manifest into physical reality. When hope has done its work, you will gain awareness. Then you will say to yourself, \"I don't wish, I don't believe, I don't hope – I intend and I know.\""};
PRESET_DATA[17]={p:"The sense of guilt always generates scenarios related to punishment, without you realising it. This is typical of the usual worldview. Every crime is always punished. As soon as you notice the slightest trace of guilt, get rid of that rubbish immediately. Do not let it spoil your life. Live true to your own convictions and you will never experience guilt. No one will dare to judge you if you do not consider yourself guilty. When you are free of guilt, you will never find yourself in a situation in which someone tries to threaten you with violence. No guilt, no punishment.",i:"If you are struggling to shift a guilt complex, it is important to stop justifying yourself. This is one of those cases where treating the symptoms of the disease successfully deals with the cause. You do not have to convince yourself that you are not obligated to anyone. Simply observe your everyday actions. This requires a certain level of awareness. If previously you had the habit of apologising for the slightest thing, adopt a different habit. Explain your actions only when it is absolutely necessary. Stop feeling as though you owe something to others. Even if the feeling of being obligated continues, do not show it outwardly. When they stop getting the former knee-jerk reaction, the manipulators will gradually back off. At the same time, the heart and the mind will gradually get used to the new sensation. If you are not trying to justify yourself, then things are obviously as they should be, and so your guilt simply cannot exist. As a result, the need for 'redemption' will appear less and less often. Therefore, via the feedback chain, the outer form will gradually tidy up the inner content. The feeling of guilt will disappear and with it, all its associated problems."};
PRESET_DATA[18]={p:"When a person tries to make themselves seem more important because they feel inferior in some way, the opposite happens. The harder they try to emphasise their worth, the less significant they actually become and vice versa. When a person is not worried about their worth, their sense of worth is unconditional. Our sense of self-worth is a very cunning type of excess potential. Balancing forces will do anything they can to wobble you off your pedestal. When you let go of your own worth, you start to acquire it. At the same time, be careful never to bruise someone else's sense of worth. Make it a personal taboo. If you do, you will save yourself a lot of problems that would seem to come out of nowhere.",i:"The need to strengthen your position and emphasise your finer qualities is an illusion. It's the same as chasing after the reflection in the vicious mirror circle. So how do you convince yourself that you are worthy and have no need to prove it? There is one feedback chain by which the effect removes the cause. You have to redirect your intention consciously. Rather than trying to put yourself forward in the most favourable light, stop making any attempt at all to increase your worth. When a person isn't trying to make themselves appear more important (although almost everyone does it), people intuitively sense that their value goes without saying and that person is, as if by magic, treated with greater favour and respect. As a result, the heart and mind are gradually instilled with the conviction that, \"I really am worth something.\" At a certain point, the mirror circle stops and then turns in the opposite direction moving towards you. As a result, your self-esteem improves and it is as if you never had an inferiority complex at all."};
PRESET_DATA[19]={p:"Always be yourself. Don't try and change yourself under any circumstances. Live life according to your own credo. When you contradict your own credo or worse when you simply don't have one, you undermine yourself as an individual and everything in life goes awry. When the image is distorted, the reflection in the mirror is distorted too. It is important to bring your thoughts and actions down to the same denominator: be true to yourself. Then the dual mirror will be free of any crooked distortion. You are the Master of your own reality. You have no reason to feel shame or fear. Remember, you are not alone. The Force is with you, and your world takes care of you.",i:"When you live true to your own credo, the heart and mind come into union. This means, that you take the actions you consider necessary without bothering about social opinion. Never change yourself under any circumstances. If you do feel pushed into doing something, which your soul actively protests against, everything will end up going to pot. Conversely, when you live in accord with your own credo, even if some of your actions seem to contradict common sense, everything will turn out all right in the end. There is no need to analyse exactly how your credo is straightening out reality. It is simply that the lack of distortion in the image makes the reflection normal again. Unity of heart and mind produces a clear image, which instantly materialises in the mirror world. All your true desires will be fulfilled. It is a universal law."};
PRESET_DATA[20]={p:"It is not worth setting out on a path that has no 'heart'. This path leads to a complete dissonance between the heart and the mind. You will experience a feeling of uneasiness in your gut, uncertainty, and frustration. On the one hand, it looks as if you are doing everything right and yet, on the other hand, your subconscious tells you that things are not right at all. When a path 'has heart', you will feel it through and through. When you go your own way, you have the incomparable feeling that everything will turn out just as you want it to. It gives you a calm, characteristic confidence. Go your own way, on which the soul rejoices, and your mind rubs its hands in glee. If you intend to find your true path, there is no doubt that you will find it.",i:"When you start living for yourself and doing what you enjoy doing, everything else in your world will catch up to comply with your path. It is all very simple. When heart and mind are in harmony, everything else automatically falls into place. When they are not in harmony, for example, when the heart is asking for something and the mind is afraid, it is important to act cautiously and prudently. Listen to your heart, but remember that you live in a material world, which is not always capable of adapting to your desires instantaneously. Of course, it is not hard to walk away from a job you hate but if you are afraid of being left without an income, do not expect a miracle. If you use the slides technique, you will be able to find any kind of work you want, be it in another city, in another country even, but without reliable support at this stage, you will be too anxious to practise the technique calmly. Never burn your bridges."};

的心态。乔丹、科比的训练师所写，强调内在驱动力而非外部条件。北京冬奥会逆袭夺金后，称这本书给了她挑战1620动作的勇气。\n\n3.《吸引力法则》（希克斯夫妇）——直接相关。这是吸引力法则的经典著作。核心观点：每个念头都会散发磁场，吸引相匹配的信号。\n\n4.《显化》（罗克西·纳福西）——直接相关。出版社宣传语明确写'谷爱凌实践的成事心法'。书中将显化分为7个步骤：明确愿景→消除恐惧→调整行为→通过考验→感恩→化嫉妒为灵感→相信。\n\n她还推荐过：《我的天才女友》《阿特拉斯耸耸肩》《柏青哥》《源泉》《人生由我》《心力》";

PRESET_DATA[5].pc = "世界就是你对它的看法。世界是一面镜子，它反射的是你对它的态度。生活是一场游戏，世界对所有人都问了同一个谜题：\"来，猜猜我是什么样的？\"每个人都按自己的感知回答——\"你是凶狠的\"\"你是舒服的\"\"快乐的\"\"阴郁的\"\"友好的\"\"敌对的\"\"幸运的\"\"倒霉的\"。有意思的是，这个测验里每个人都是赢家：世界同意每个人的说法，按每个人\"订购\"的样子出现在他们面前。你觉得你的世界是什么样的？";
PRESET_DATA[5].ic = "如果一个人坚信\"好东西早就被抢光了\"，那他的货架上就永远是空的。如果他认为\"买好东西要排长队、花大钱\"，那他就真的会遇到这种情况。如果你的预期是悲观的、充满怀疑的，那这些就会被证实。如果你预期会遇到不友好的环境，你的顾虑就会被证实。但如果一个人带着天真的想法——\"世界上最好的东西是给我留着的\"——这个也会成真。那个\"怪人\"，不知道\"没有奋斗就没有收获\"这回事，却不知怎的刚好站在柜台前，新货刚好到了，仿佛专门给他算好的。然后他被告知：\"第一个顾客免费拿。\"他身后排起长队，排队的都是那些\"知道生活很苦、其他人只是运气好\"的人。如果有一天这个\"幸运的怪人\"面对\"生活真相\"改变了对世界的看法，他的现实也会跟着变——等他终于\"看清真相\"时，他就会被打回队伍的末尾。";

PRESET_DATA[6].pc = "你向世界发出什么想法，它就会像回旋镖一样回到你身上。当你恨某样东西的时候，你把全部身心投入那种恨意里，这个清晰而尖锐的形象被反射到镜子里，充满你的整个现实。结果你更来劲了，情绪更强了。你在心里想把所有人都骂一遍——\"你们都滚！\"但镜子把回旋镖弹回来了。你对别人说\"滚\"，结果生活把你给\"滚\"了。小心别往世界之镜里扔负面能量——你会完全意想不到地收到同样的回应。顺便说一句，爱也是回旋镖。";
PRESET_DATA[6].ic = "思想是在世界之镜里\"物质化\"的。比如你不满意自己的外表，你照镜子的时候就不快乐——你把所有注意力都放在自己不喜欢的特征上，把它们当作\"事实\"。你要明白：你在镜子里是什么样，取决于你怎么看待自己。换个新规则：不要盯着镜子看，瞥一眼就够了。找好的地方，忽略其他的。把注意力集中在你想要的东西上。你以前是怎么做的？你在陈述事实：\"我不喜欢我自己。我不喜欢我的世界。\"镜子只是进一步确认：\"没错，就是这样。\"现在你的任务变了：去找你喜欢的东西，同时在脑子里描绘你想要的画面。从现在开始，你只做一件事——寻找那些能证明\"情况在变好\"的迹象。你会发现一天比一天好。如果你经常这么练习，很快你就会惊掉下巴。";

PRESET_DATA[7].pc = "人们就像站在镜子前的小猫，不知道看到的是自己。你可能觉得自己受制于环境、改变不了——但这只是个幻觉，一个假道具，只要你想就能拆穿。你在无意识地兜圈子。你观察现实，表达你对现实的态度，镜子在现实中确认了你的态度。这就像一个闭环反馈系统。现实是你思想形态的反射，而思想形态又反过来很大程度上由镜中的倒影决定。创造现实的诀窍就是：把这个循环反过来。先看你自己，再看镜子。";
PRESET_DATA[7].ic = "当一个人被\"对世界的态度\"绑在镜子上时，他就在追着倒影跑，想改变倒影里某个东西。现在我们把镜像循环反过来：先表达我们对世界的态度——镜子在现实中固化这个态度——然后我们再观察现实。结果会是什么？不再是\"对倒影的无力抱怨\"，而是\"有目的、有意识的思想形态的宣告\"。与其习惯性地对镜中景象表示不满，转过身去，在脑海里创造你想看到的画面。这就是走出镜像迷宫的出口。世界会先停下来，然后开始向你走来。当你掌握了你对现实的态度，外在意念就开始运作了——对外在意念来说，没有实现不了的事。你只需要把注意力从\"倒影\"转移到\"影像本身\"。换句话说：掌控你的思想。不要去想那些你不想要的、想躲开的；去想那些你真正想要的、正在努力实现的。";

PRESET_DATA[9].pc = "要想玩得转转移（Transurfing），你必须有足够高的能量。问题是，我们大部分能量都被一堆\"没实现的计划\"给耗掉了——它们一直在拖累我们。目标能激活意图的能量，但前提是：这个目标已经在实现的路上了，而不是一个\"悬在半空中\"的项目。所以你要么放弃一些潜在计划，要么开始付诸行动。放过自己。给自己更多自由。列一个清单，写下那些正在压垮你的限制，然后甩掉它们。当你这么做的时候，意图能量的储备会瞬间释放出来，你就能往前走了。";
PRESET_DATA[9].ic = "很多人一辈子都扛着没完没了的责任、没做完的事、苛刻的条件、没实现的计划、数不清的目标。花点时间感受一下——什么东西在压着你？你想想就会发现，有几块铅块你完全可以扔掉，而且不会有一点遗憾。如果你没法全部实现，就没必要一直拖着它们到处走。比如：\"我必须比所有人都好\"\"我要证明自己的价值\"\"我只需要赢，否则我就没法尊重自己\"\"我不能犯错\"。还有像\"戒烟\"、\"学外语\"、\"下周一我要重新做人\"这种。任何被无限期拖延的\"以后再说\"，都是多余货物。一个意图要么实现，要么放弃——因为它会消耗你的能量，浪费能量是蠢事。有没有一个大铅块，你一直在暗中想着要扔掉，但还没鼓起勇气？想象一下扔掉之后你会多轻松。";

PRESET_DATA[10].pc = "如果你毫无保留地确信某样东西理应是你的，生活就会给你。你的选择就是法则，无条件的。选择的自由、拥有的决心，是由意图的能量创造的。如果内在和外在的重要性消耗了你大量能量，你的意图就没有力量了。要放下事物\"好像很重要\"的感觉，你需要觉察你的行动，觉察你在什么东西上赋予了过高的重要性，以及这么做的后果。过剩潜力的能量通过行动来消散。在脑子里播放你的目标幻灯片，然后安静地朝着目标方向一步一步走。这就是你需要的全部行动。";
PRESET_DATA[10].ic = "怎么停止恐惧？找个安全网、一个退路。\n怎么停止焦虑和过度担忧？行动。焦虑和担忧通过行动来消散。\n怎么停止\"等待\"和\"渴望\"？接受失败的可能性，然后行动。通过行动来消溶解欲望和期待。\n怎么克服自我价值问题？把你的价值当作事实来接受，停止任何\"试图提升它\"的行动。\n怎么停止烦躁？跟钟摆玩游戏，打破它的规则。用\"异常反应\"打乱钟摆的节奏。\n怎么放下内疚？停止为自己辩解。\n怎么应对被侮辱的感觉？停止争斗，顺着变体流动。\n如果你觉得放不下怨恨和愤怒怎么办？允许自己有这个缺点。别逼自己每次都赢。\n最后，怎么防止自己在严重问题的重压下崩溃？遵循\"协调意图\"的原则。与其跟过剩潜力打架，不如在净化后的意图基础上行动。意图在行动的过程中被净化。";

PRESET_DATA[11].pc = "要获得自信，首先得放下对\"需要自信\"的执着。不安全感源于你给事物赋予了过高的重要性。我不需要自信当拐杖——因为如果什么都没有\"那么重要\"，我就没什么需要保护的，也没什么需要争取的。没什么好怕的，也没什么好担心的。当没有任何东西对我过度重要时，我的世界就是纯粹而透明的。我拒绝争斗，选择顺着变体流动。我是空的，所以钩不住我。我不需要挣扎。我安静地走自己的路，沿途拿属于我的东西。这与其说是\"不稳固的自信\"，不如说是\"平静的、有意识的协调\"。";
PRESET_DATA[11].ic = "不安全感是个恶性循环。你的目标越重要，你越想得到它，不安全感就越强。你对某件事越担心、越焦虑，你的恐惧就越快被证实。为自我价值而战会耗尽你的能量。内疚感能把一个人的生活变成失败者悲惨的存在。你如何打破这个迷宫？你打不破。没有出路。迷宫的秘诀是：当你停止找出口、放下事物的重要性时，迷宫的墙自己就倒了。停止为证明你的价值而战，它自然会回来。停止向别人辩解，你就不再内疚。同样，你降低对外在事物的重要性，你就不会被它们表面的重大意义所支配。最后，当心与脑和谐一致时，完美的协调就达成了。要做到这一点，听你内心的指引，忠于你自己的信念。";

PRESET_DATA[12].pc = "当你与周围世界保持平衡与和谐时，生活就顺滑而愉快。你毫不费力地达成目标。但当你堆起过剩潜力的墙时，生活就成了与平衡力量的战斗。当你遇到困难局面时，试着找出：你在哪里过火了？你沉迷于什么？你在什么人/事上赋予了过度的意义？确认你的价值，然后放手。墙会倒，障碍会自己移开，问题会自己解决。不要试图克服障碍，而是降低它们的重要性。";
PRESET_DATA[12].ic = "生活中的一切都在往平衡走。哪有过剩的能量潜力，平衡力量就会出现，把它消除。当你把某件事看得过度重要时，你会得到与意图相反的结果。比如你批评自己的时候，你就是在跟自己的灵魂冲突。平衡力量会让你跟自己的缺点较劲、试图隐藏它们——结果它们更明显了。你批评世界的时候，你面对一大堆钟摆。平衡力量会试图\"把你削小\"、把你推开。除了降低重要性之外，也不要\"用力过猛\"。降低外在重要性不是让你蔑视或低估事物，而是别把生活看得太严肃。不要忽视生活里的事，但也不要把它们涂上甜腻的糖衣——接受世界的本来面目。降低内在重要性也绝不是顺从或自我贬低。不要美化或贬低自己的优点和缺点。你只需要给自己一个\"做你自己\"的特权。";

PRESET_DATA[13].pc = "有魅力的人的秘密是什么？他们把负面幻灯片从脑子里扔出去，换成正面的。魅力是心与脑之间\"互相喜欢\"产生的结果。一个有魅力的人内心有一种喜悦感——他们享受生活，沐浴在自己的爱里，没有丝毫自恋。别人注意到的正是这种喜悦感。这样的人不多，但你可以成为其中之一。你只需要转过身面向你的心，爱自己，踏上属于你自己的路。不仅性格会变，身体会更有吸引力，面容更动人，笑容也会变得耀眼。";
PRESET_DATA[13].ic = "吸引力的秘密就是心脑合一。当一个人接受真实的自己、爱自己、做自己喜欢的事时，他会散发出内在的光，按照自己的信条生活。这恰恰是大多数人缺的东西，所以他们像飞蛾扑火一样被有魅力的人吸引。在能量层面上，魅力就是心脑合一的纯净波动。通过训练你的能量，你就能发展出影响和赢得他人的能力。一个拥有充足自由能量的人，别人自然会对他产生好感和兴趣。如果你觉得很难无条件爱自己，试试能量场训练——默念：\"我充满能量。我的能量在增强。我有一个强大的能量场，它每天都在变强。我散发着爱与魅力的能量。我是一个纯粹的能量源。人们能感觉到我的能量场，对我有好感。\"当你注意到别人真的被你吸引时，别忘了告诉自己\"这真的有用\"——因为理性思维需要听到确认，它一直在怀疑\"我真的可以吗\"。";

PRESET_DATA[14].pc = "如果你不爱自己，别人也不会爱你，而且更重要的是，你永远不会快乐。心与脑之间的任何冲突，都会在人的外表和性格上留下痕迹。相应地，你的个人世界也会越来越暗。先爱你自己，然后才去关注别人的好品质。你要感受并理解这一点：钟摆逼你改变、逼你背离自己的心，去服从\"他们比你强，所以你学他们、像他们、在矩阵里做个齿轮\"这个规则。但事实上，你是独一无二的。向内走，接受真实的自己，主张\"我就是对的\"的权利。这样你就有值得骄傲的东西，有尊重自己的理由。";
PRESET_DATA[14].ic = "一个人在迎合别人标准的路上走了太久，就很难突然爱自己。\"我连自己都不喜欢，怎么能爱自己？\"——这就是由膨胀的内外在重要性产生的过剩潜力。外在重要性体现在你把别人的标准当作完美典范——你是不是过高评价了别人？内在重要性体现在你强迫自己跟随别人的标准——谁说你比他们差？你的自尊是不是太低了一点？要爱自己，把外在重要性从神坛上踹下来，别再崇拜偶像了。谁拦着你设立自己的标准？让他人来追你吧！放下内在重要性，放过自己。给自己一个\"可以有缺点\"的特权，把注意力放在你的优点上。";

PRESET_DATA[15].pc = "如果你被甩了、在单相思，或者在寻找爱，你首先要爱自己。如果你还觉得没法按原样爱自己，那就开始照顾自己、专注自己的成长：去运动、学门外语、换种穿衣风格、找一个护身符——吊坠或戒指。当你开始照顾自己时，你会找到新的目标感。如果你还没找到目标，照顾自己就可以成为你的目标。这是真正有价值的目标，它会为你带来成功和丰盛。你值得最好的。";
PRESET_DATA[15].ic = "人的天性是这样的：只有在别人恰好对自己满意时，才对自己满意；只有在别人爱自己时，才爱自己。但世界是一面镜子。如果影像本身没有爱，倒影里怎么会有？镜子没法反射不存在的东西。这是一个恶性循环。怎么打破？很简单。第一，我们爱那些我们照顾的人——所以多关注自己、照顾自己，给自己一些\"自己的时间\"。第二，爱是回旋镖。如果你向世界发出爱，它会回来。你会体验到爱——包括对自己的爱——只要你闪耀着爱，而不是散发恐惧、不信任和批判。你迈出第一步，倒影就会向你走来。这是一个反馈链：我把爱发给世界——爱被反射回来——世界回应——我被爱——所以我也喜欢自己、开始爱自己。";

PRESET_DATA[16].pc = "\"照着你的信，给你成全了。\"这话说过不止一次了，而且确实是真的。但你如何开始相信它？试图说服自己\"这是真的\"是没用的。你得去做具体的事——按照转移的原则去塑造你的现实、可视化你的目标幻灯片。把原则付诸实践，你会看到结果。外在意念会打开一扇门，在那里不可能变成可能。当理性思维面对事实时，它会把\"不可思议\"纳入自己的世界观，允许奇迹发生。当你亲眼看到转移确实有效时，你就不再需要\"信\"了——你会\"知道\"。";
PRESET_DATA[16].ic = "转移给了你一张地图和游戏规则。怎么用是你的事。你是你自己世界的王。不要屈服于别人的影响。相信自己。不要依赖别人的决定。你比任何人都更清楚需要发生什么。即使你现在有了这些知识，你也不能免于犯错。真正的成功是从失败的废墟上长出来的。大多数杰出人物都经历过很多——只是这些部分通常被轻描淡写。所以如果你遭遇了失败，恭喜你，你在通往成功的路上。有时你会觉得环境对你不利——但你怎么可能确切知道哪条路会带你到达目标呢？古老知识的守护者揭示转移，不是为了让你相信形而上学，而是为了给你希望。有信就有怀疑的空间。但我们需要希望，来让我们迈出行动的第一步。开始行动，你会看到以前觉得不可能的事开始显形。当希望完成它的工作，你就会获得觉知。然后你会对自己说：\"我不是在希望，不是在相信，不是在期待——我在意图，而且我知道。\"";

PRESET_DATA[17].pc = "内疚感总是在你不知情的情况下，生成\"惩罚\"的场景。这是通常世界观的标准配置——每个罪行都会被惩罚。一旦你察觉到一丝内疚，马上把那堆垃圾扔掉。别让它毁掉你的生活。按你自己的信念生活，你永远不会感到内疚。如果你不认为自己有罪，没人敢审判你。当你从内疚中解脱出来时，你永远不会遇到有人用暴力威胁你的情况。没有内疚，就没有惩罚。";
PRESET_DATA[17].ic = "想摆脱内疚情结，关键是停止为自己辩解。这是少数几个\"治标就能治本\"的情况之一。你不需要说服自己\"我对任何人没有义务\"。只需要观察你的日常行为——这需要觉知。如果你以前有\"为最小的事道歉\"的习惯，换一个习惯：只在绝对必要的时候解释你的行为。停止感觉\"我欠别人什么\"。即使那种\"有义务\"的感觉还在，也不要表现出来。当操纵者得不到以前的\"膝跳反应\"时，他们会慢慢退开。同时，你的心与脑会逐渐习惯这种新感觉。如果你不是在为自己辩解，那么事情自然就是对的——内疚就不存在了。结果，对\"赎罪\"的需求会越来越少。通过反馈链，外在行为会反过来整理内在状态。内疚感消失了，它带来的一切问题也随之消失。";

PRESET_DATA[18].pc = "当一个人因为感到自卑而试图让自己显得更重要时，结果恰恰相反——他越强调自己的价值，实际上越没价值，反之亦然。当一个人不担心自己的价值时，他的价值就是无条件的。自我价值感是一种非常狡猾的过剩潜力。平衡力量会想尽办法把你从神坛上摇下来。当你放下自己的价值时，你开始真正拥有它。同时，永远不要伤害别人的自我价值感——把它当成你的个人禁忌。如果你能做到，会省去很多莫名其妙的问题。";

PRESET_DATA[6].r = "===== Day 6: The Boomerang 完整对话 =====\n\nChatGPT：Day 6 回旋镖——你扔出什么，就弹回什么。原文：'Whatever thoughts you send out into the world, they will return to you like a boomerang.'\n\n你用恨填满心和脑，那个清晰、尖锐的恨的画面会被镜子反射，填满你整个世界的层次。结果你更激动，情绪更强。你心里想把所有人都送进地狱——'都给我滚！'——但镜子把回旋镖弹回来，你自己去了地狱。\n\n小心向世界之镜发送负面能量。如果你发了，你会完全出乎意料地收到同样的回应。\n\n顺便说一句——爱也是回旋镖。\n\n===== 翻译成减肥 =====\n\n- 你恨自己的体重→回旋镖弹回来→你更恨自己、更焦虑\n- 你讨厌'我又没控制住'→回旋镖弹回来→你更失控\n- 你爱自己的身体（哪怕现在不是理想状态）→回旋镖弹回来→你开始对自己的身体有耐心\n\n你今天站在镜子前，是挑剔自己'这里胖了'，还是说'嗯，今天看起来不错'？你扔出什么，你就收到什么。\n\nInterpretation 原文核心翻译：\n思想在世界之镜中物质化。比如，如果你对自己的外表不满意，你照着镜子毫无乐趣。你把注意力全部集中在你讨厌的地方，然后把它陈述为一个事实。你必须明白：你在镜子里被反射成什么样，对应的是你对自己的感觉。\n\n采纳一条新规则：不要盯着镜子看——偷瞄镜子。找出积极的、忽略其他一切。把你看到的所有东西都通过这个滤镜。把注意力集中在你想要的东西上。\n\n你以前怎么做的？你陈述事实：'我不喜欢自己。我不喜欢我的世界。'镜子只是更坚定地确认：'没错，就是这样。'\n\n现在你有一个不同的任务：找出你爱的东西，同时在心里描绘你想要的画面。从现在开始，你只做一件事——寻找并找到确认正面变化正在发生的迹象。你会发现事情一天比一天更好。如果你经常这样练习，用不了多久你就会惊到下巴掉下来。\n\n===== 关于假装的关键区分 =====\n\n我问：如果我很想吃炸鸡，但我假装我不在意，这是不是也在扔'假装'的回旋镖？\n\nChatGPT：对。这就是Day 7最精确的应用。\n\n❌假装的画面：'我不饿、我不饿、我不饿'——这是对抗，是排斥，是在对镜子说'别照出这个！'\n\n✅真实的画面：'如果我已经健康了，我的身体会怎么选择？'——这是从身份出发，不是对抗\n\n区分：\n对抗=你对镜子说'别照出这个！'\n选择=你转身先画一幅新画，再挂到镜子前\n\n===== 实操 =====\n\n每天出门前/吃饭前/打开手机前，先做这一件事：花30秒，闭眼，感受：'如果我已经是我想要的那个版本的我了，我现在是什么感觉？'然后睁眼，该干嘛干嘛。\n\n这30秒，就是你在'制作画面'。其他时间，都是'看镜子'。\n\n为什么'先制作画面'这么重要？因为'看镜子'是被动接收，你看到什么就是什么。'制作画面'是主动发送，你在给镜子下新的订单。\n\n大部分人一辈子都在看镜子、抱怨镜子、试图擦镜子。而你知道：先画好画面，镜子自然会跟着变。";

function loadPresetContent() {
  if (!confirm('导入前20天英文 Principle + Interpretation，以及从ChatGPT对话中提取的疑问/反思/总结。已有英文内容不会被覆盖。继续？')) return;
  var count = 0;
  for (var dayNum = 1; dayNum <= 20; dayNum++) {
    var idx = DAYS.findIndex(function(d){return d.day===dayNum;});
    if (idx < 0) continue;
    var data = PRESET_DATA[dayNum];
    if (!data) continue;
    if (!localStorage.getItem(storageKey(idx, 'principleEn'))) {
      localStorage.setItem(storageKey(idx, 'principleEn'), data.p);
      count++;
    }
    if (!localStorage.getItem(storageKey(idx, 'interpretationEn'))) {
      localStorage.setItem(storageKey(idx, 'interpretationEn'), data.i);
      count++;
    }
    // Chat insights: questions (q), reflections (r), summary (s)
    if (data.q) { localStorage.setItem(storageKey(idx, 'questions'), data.q); count++; }
    if (data.r) { localStorage.setItem(storageKey(idx, 'reflections'), data.r); count++; }
    if (data.s) { localStorage.setItem(storageKey(idx, 'summary'), data.s); count++; }
    if (data.pc) { localStorage.setItem(storageKey(idx, 'principleCn'), data.pc); count++; }
    if (data.ic) { localStorage.setItem(storageKey(idx, 'interpretationCn'), data.ic); count++; }
  }
  renderSidebar();
  renderMain();
  renderCalendar();
  updateProgress();
  alert('完成！已导入 ' + count + ' 条内容。切换到 Day 1 查看。');
  switchToDay(0);
}

init();
</script>
